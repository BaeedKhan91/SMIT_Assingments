<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<!--
    {
     "Name":"Baeed",
     "Roll Num":"343045"  
    }
-->
<body>
    <a href="./index.html">
        <img src="./arrow icon.jpg" alt="" height="50px" width="50px"> 
     </a>      
    <div class="header-section" >
       
       
            <img src="./Smit.png" alt="SMIT Logo" height="180px" width="180px">
        
        
        <h2>STUDENT REGISTRATION FORM</h2>
    </div>
    <form>
    <div class="form-container">
        

       <div class="first-name">
        <label for="">FIRSTNAME</label>
        <input type="text" name="f-name" placeholder="Enter First Name" maxlength="30"> (max 30 characters a-z and A-Z)

       </div>
       <div class="l-name">
        <label for="">LASTNAME</label>
        <input type="text" name="l-name" placeholder="Enter Your Last Name" maxlength="30"> (max 30 characters a-z and A-Z)
       </div>
        <div class="mobile-number-section">
            <label for="mobile">MOBILE NUMBER</label>
            <input type="text" name="mobile" placeholder="Enter the Mobile Number" maxlength="10">(10 Digits Numbers)
        </div>

        <div class="gender-section">
            <label>GENDER</label>
            <input type="radio" name="gender" value="male" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <div class="address-section">
            <label for="address">ADDRESS</label>
            <textarea  name="address"></textarea>
        </div>

       
            <label for="city">CITY</label>
            <input type="text" me="city" placeholder="Enter the City Name" maxlength="30"> (max 30 characters a-z and A-Z)

            <label for="pin-code">PIN CODE</label>
            <input type="number"  name="pin-code" placeholder="Enter the Pin Code" maxlength="6">(6 Digits Numbers)

            <label for="state">STATE</label>
            <input type="text" name="state" placeholder="Enter the State" maxlength="30"> (max 30 characters a-z and A-Z)

            <label for="country">COUNTRY</label>
            <input type="text"  name="country" placeholder="Enter the Country Name">
        

        <div class="hobbies-section">
            <label>HOBBIES</label>
            <input type="checkbox"  name="hobbies" value="drawing">
            <label for="drawing">Drawing</label>
            <input type="checkbox"  name="hobbies" value="singing">
            <label for="singing">Singing</label>
            <input type="checkbox"  name="hobbies" value="dancing">
            <label for="dancing">Dancing</label>
            <input type="checkbox"  name="hobbies" value="sketching">
            <label for="sketching">Sketching</label>
            <label for="others">Others</label>
            <input type="text" name="hobbies">
        </div>

        <div class="qualification-section">
            <label>QUALIFICATION</label>
            <table>
                <thead>
                    <tr>
                        <th>Sl.No.</th>
                        <th>Examination</th>
                        <th>Board</th>
                        <th>Percentage</th>
                        <th>Year of Passing</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Class X</td>
                        <td><input type="text" name="class10-board" maxlength="10"></td>
                        <td><input type="text" name="class10-percentage" maxlength="5"></td>
                        <td><input type="text" name="class10-year" maxlength="4"></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Class XII</td>
                        <td><input type="text" name="class12-board" maxlength="10"></td>
                        <td><input type="text" name="class12-percentage" maxlength="5"></td>
                        <td><input type="text" name="class12-year" maxlength="4"></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Graduation</td>
                        <td><input type="text" name="graduation-board" maxlength="10"></td>
                        <td><input type="text" name="graduation-percentage" maxlength="5"></td>
                        <td><input type="text" name="graduation-year" maxlength="4"></td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>Masters</td>
                        <td><input type="text" name="masters-board" maxlength="10"></td>
                        <td><input type="text" name="masters-percentage" maxlength="5"></td>
                        <td><input type="text" name="masters-year" maxlength="4"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="courses-section">
            <label for="courses">COURSES APPLIED FOR</label>
            <select  name="courses">
                <option value="">Select any course</option>
            </select>
        </div>

        <div class="file-upload-section">
            <label for="upload">Upload your pic (only .png, .jpg, .jpeg formats allow)</label>
            <input type="file" name="upload" accept=".png, .jpg, .jpeg">
        </div>

        <div class="buttons-section">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>
    </div>
</form>
</body>
</html>
